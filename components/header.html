<!-- CROSUMMED — GLOBAL HEADER v4 -->

<div class="header" data-mode="normal">
    <div class="header-top">

        <!-- LOGO (links to landing) -->
        <a href="landing.html" class="logo" style="text-decoration:none;">
            <div class="logo-name">CrosumMed</div>
            <div class="logo-tagline">AI Powered Pharmaceutical Ecosystem Portal</div>
        </a>

        <!-- SEARCH BAR (hidden in minimal mode via CSS) -->
        <div class="search-container header-search-wrap">
            <div class="search-type-selector">
                <button type="button" id="searchTypeBtn">
                    PharmaProducts <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div id="searchTypeDropdown" class="search-type-dropdown">
                    <div data-type="PharmaProducts">PharmaProducts</div>
                    <div data-type="PharmaArticles">PharmaArticles</div>
                    <div data-type="PharmaNews">PharmaNews</div>
                </div>
            </div>
            <form id="globalSearchForm" action="search.html" method="GET" style="display:flex;flex:1;">
                <input type="text" id="globalSearch" name="query" placeholder="Search medicines, products…" autocomplete="off">
                <button type="submit" class="search-submit"><i class="fa-solid fa-search"></i></button>
            </form>
            <div id="searchSuggestions"></div>
        </div>

        <!-- RIGHT ACTIONS -->
        <div class="header-actions">
            <div class="theme-toggle" id="headerThemeToggle" title="Toggle dark mode">
                <div class="theme-toggle-track">
                    <div class="theme-toggle-knob">
                        <i class="fa-solid fa-sun icon-sun"></i>
                        <i class="fa-solid fa-moon icon-moon"></i>
                    </div>
                </div>
            </div>
            <button class="menu-btn" id="menuBtn" title="Menu"><i class="fa-solid fa-bars"></i></button>
        </div>
    </div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-header-title">Menu</span>
        <button class="sidebar-close" id="closeBtn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="sidebar-body">
        <!-- AUTH: Guest -->
        <div class="sidebar-auth-guest" id="sidebarGuest">
            <div class="auth-heading">Welcome to CrosumMed</div>
            <button class="btn-signin" id="btnSignIn"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
            <button class="btn-register" id="btnRegister"><i class="fa-solid fa-user-plus"></i> Create Account</button>
        </div>
        <!-- AUTH: Logged In -->
        <div class="sidebar-auth-user" id="sidebarUser">
            <div class="profile-avatar" id="profileAvatar">U</div>
            <div class="profile-name" id="profileName">User</div>
            <div class="profile-username" id="profileUsername">user@email.com</div>
        </div>

        <!-- NAV LINKS -->
        <a href="landing.html" class="sidebar-nav-link"><i class="fa-solid fa-house"></i> Home</a>

        <div class="sidebar-divider-line"></div>

        <a href="profile.html" class="sidebar-nav-link sidebar-gated disabled-link" onclick="return requireLogin('view profile');"><i class="fa-solid fa-user-circle"></i> My Profile</a>
        <a href="profile.html?tab=bookmarks" class="sidebar-nav-link sidebar-gated disabled-link" onclick="return requireLogin('view bookmarks');"><i class="fa-solid fa-bookmark"></i> My Bookmarks</a>
        <a href="profile.html?tab=subscription" class="sidebar-nav-link sidebar-gated disabled-link" onclick="return requireLogin('manage subscription');"><i class="fa-solid fa-crown"></i> Subscription</a>
        <a href="crosum.html" class="sidebar-nav-link sidebar-gated disabled-link" onclick="return requireLogin('chat with Crosum');"><i class="fa-solid fa-robot"></i> Consult with Crosum</a>
        <a href="javascript:void(0)" class="sidebar-nav-link sidebar-gated disabled-link" onclick="openNearbyPharmacy(); return false;"><i class="fa-solid fa-map-location-dot"></i> Pharmacy Near Me</a>

        <div class="sidebar-divider-line"></div>

        <a href="index.html" class="sidebar-nav-link"><i class="fa-solid fa-circle-info"></i> About CrosumMed</a>

        <div class="sidebar-divider-line"></div>

        <div class="sidebar-theme-row">
            <div class="sidebar-theme-label"><i class="fa-solid fa-circle-half-stroke"></i> Dark Mode</div>
            <label class="sidebar-theme-switch">
                <input type="checkbox" id="sidebarThemeSwitch">
                <span class="sidebar-switch-slider"></span>
            </label>
        </div>
    </div>

    <div class="sidebar-footer" id="sidebarFooter" style="display:none;">
        <button class="btn-signout" id="btnSignOut"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
</div>
